name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC token exchange
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Build backend Docker image → push to ECR → deploy to ECS Fargate
  # ────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Backend → ECR → ECS Fargate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ secrets.BACKEND_ECR_REPO }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            ./backend
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT
        id: build

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --region ${{ env.AWS_REGION }} \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment

      - name: Wait for ECS service to stabilise
        run: |
          aws ecs wait services-stable \
            --region ${{ env.AWS_REGION }} \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE }}

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Build React app → sync to S3 → invalidate CloudFront
  # ────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → S3 + CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app
        working-directory: frontend
        env:
          # Backend API base URL baked into the Vite build
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Sync assets to S3 (immutable cache)
        run: |
          aws s3 sync frontend/dist/assets/ s3://${{ secrets.S3_BUCKET }}/assets/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

      - name: Sync other files to S3 (no cache)
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET }}/ \
            --delete \
            --exclude "assets/*" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
